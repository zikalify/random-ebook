<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Random Book — Offline</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Outfit:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Custom modifications for offline page */
    .offline-icon-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100%;
      min-height: 280px;
    }
    
    .offline-svg {
      width: 100px;
      height: 100px;
      fill: var(--accent-gold);
      filter: drop-shadow(0 0 10px rgba(var(--accent-gold-rgb), 0.3));
      animation: pulse 2s infinite ease-in-out;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.05); opacity: 1; }
    }
  </style>
</head>
<body>
  <!-- Animated Background Canvas/Blobs -->
  <div class="bg-glow">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="app-container">
    <header class="app-header">
      <h1 class="logo-text">Random Book</h1>
      <p class="subtitle">Standard Ebooks</p>
    </header>

    <main class="main-content">
      <div class="book-card">
        <!-- Left Side: Offline Visual -->
        <div class="cover-section">
          <div class="offline-icon-wrapper">
            <svg class="offline-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
              <path d="M21.9 21.9l-19.8-19.8-1.4 1.4 3 3v11.359l8.3 1.641 8.5-1.684.2-.04v-1.635l2.8 2.8 1.4-1.4zm-11.2-2.732l-7-1.385v-9.142l2.7 2.7v6.442l4.3.85v.535zm10.3-2.043l-1.3-1.3v-11.458l-7 1.385v4.542l-2-2v-3.927l9-1.784v14.542z"/>
            </svg>
          </div>
        </div>

        <!-- Right Side: Details and Actions -->
        <div class="details-section">
          <div class="meta-container">
            <span class="discover-tag" style="background: rgba(220, 53, 69, 0.1); border-color: rgba(220, 53, 69, 0.25); color: #ff6b6b;">Offline Mode</span>
            <h2 class="book-title" style="font-size: 2.1rem;">Connection Lost</h2>
            <div class="author-label">Status</div>
            <h3 class="book-author" style="font-size: 1.1rem; color: var(--text-muted); font-weight: 300; line-height: 1.6; text-transform: none; letter-spacing: 0;">
              We couldn't reach standardebooks.org. Please check your internet connection and try reloading the page.
            </h3>
          </div>

          <div class="actions-container">
            <button onclick="window.location.reload()" class="btn btn-primary" style="flex: 1;">
              <span>Retry Connection</span>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"></path>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </main>

    <footer class="app-footer">
      <p>Sourced from Standard Ebooks. Free of copyright restrictions.</p>
    </footer>
  </div>
</body>
</html>
