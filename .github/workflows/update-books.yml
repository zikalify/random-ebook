name: Update Books Database

on:
  schedule:
    # Runs every Sunday at midnight UTC
    - cron: '0 0 * * 0'
  workflow_dispatch: # Allows you to manually trigger it from GitHub anytime

jobs:
  update-json:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Crucial: Gives the action permission to commit files back

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Run Scraper Script
      run: |
        python fetch_books.py 

    - name: Commit and Push changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add books.json
        
        # Only commit if books.json actually changed, preventing empty error runs
        git diff --quiet && git diff --staged --quiet || (git commit -m "Automated books.json update" && git push)
